name: yuec
description: YueC Music Player - A simple and elegant music player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  just_audio: ^0.9.39
  audio_service: ^0.18.14
  path_provider: ^2.1.3
  http: ^1.2.0
  flutter_archive: ^6.0.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
