name: yuec
description: YueC Music Player - A simple and elegant music player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  path_provider: ^2.1.0
  http: ^1.2.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
