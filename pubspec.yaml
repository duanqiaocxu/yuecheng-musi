name: yuec
description: YueC Music Player - A simple and elegant music player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  path_provider: ^2.1.5
  http: ^1.2.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.0
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
