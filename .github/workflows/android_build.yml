name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Create Flutter project
        run: flutter create --org com.yuec yuec_app

      - name: Copy source files
        run: cp -r pubspec.yaml lib assets analysis_options.yaml yuec_app/

      - name: Install dependencies
        run: flutter pub get
        working-directory: yuec_app

      - name: Build APK
        run: flutter build apk --release --split-per-abi
        working-directory: yuec_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yuec-apk
          path: |
            yuec_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
