name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Create Flutter project and build
        shell: bash
        run: |
          mkdir -p /tmp/yuec-build
          cd /tmp/yuec-build
          flutter create --org com.yuec --project-name yuec .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/analysis_options.yaml . 2>/dev/null || true
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yuec-apk
          path: /tmp/yuec-build/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
