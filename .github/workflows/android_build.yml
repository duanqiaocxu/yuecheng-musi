name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build
        run: |
          rm -rf android ios test

          keytool -genkey -v -keystore $HOME/key.jks -alias yuec -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=YueC, OU=YueC, O=YueC, L=Shanghai, ST=Shanghai, C=CN"

          flutter create --org com.yuec --project-name yuec --platforms android .

          echo "storeFile=$HOME/key.jks" > android/key.properties
          echo "storePassword=123456" >> android/key.properties
          echo "keyPassword=123456" >> android/key.properties
          echo "keyAlias=yuec" >> android/key.properties

          mkdir -p android/app/src/main/resources
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > android/app/src/main/res/values/styles.xml
          echo "<resources>" >> android/app/src/main/res/values/styles.xml
          echo "<style name=\"LaunchTheme\" parent=\"@android:style/Theme.Light.NoTitleBar\">" >> android/app/src/main/res/values/styles.xml
          echo "<item name=\"android:windowBackground\">@android:color/black</item>" >> android/app/src/main/res/values/styles.xml
          echo "</style>" >> android/app/src/main/res/values/styles.xml
          echo "<style name=\"NormalTheme\" parent=\"@android:style/Theme.Light.NoTitleBar\">" >> android/app/src/main/res/values/styles.xml
          echo "<item name=\"android:windowBackground\">@android:color/black</item>" >> android/app/src/main/res/values/styles.xml
          echo "</style>" >> android/app/src/main/res/values/styles.xml
          echo "</resources>" >> android/app/src/main/res/values/styles.xml

          flutter pub get
          flutter build apk --debug

      - name: Sign
        run: |
          for apk in build/app/outputs/flutter-apk/*.apk; do
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $HOME/key.jks -storepass 123456 -keypass 123456 "$apk" yuec
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: yuec-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
