name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build
        run: |
          rm -rf android ios test build
          cat > lib/services/music_service.dart << 'DARTEOF'
          import 'package:dio/dio.dart';
          class MusicService {
            final Dio _dio = Dio(BaseOptions(connectTimeout: Duration(seconds: 10), receiveTimeout: Duration(seconds: 10)));
            Future<List<Map<String, String>>> search(String query) async {
              try {
                final r = await _dio.get('https://music.163.com/api/search/get', queryParameters: {'s': query, 'type': 1, 'limit': 20, 'offset': 0});
                final d = r.data;
                if (d != null && d['result'] != null && d['result']['songs'] is List && (d['result']['songs'] as List).isNotEmpty) {
                  final songs = d['result']['songs'] as List;
                  List<Map<String, String>> res = [];
                  for (final s in songs) {
                    if (s['id'] == null) continue;
                    String a = '';
                    if (s['artists'] is List) { for (final x in s['artists']) { if (a.isNotEmpty) a += ' / '; a += x['name']?.toString() ?? ''; } }
                    res.add({'title': s['name']?.toString() ?? '', 'artist': a, 'album': s['album']?['name']?.toString() ?? '', 'url': 'netease:${s['id']}', 'source': 'netease'});
                  }
                  if (res.isNotEmpty) return res;
                }
              } catch (_) {}
              return [
                {'title': query, 'artist': 'YueC Demo', 'album': '', 'url': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', 'source': 'demo'},
                {'title': 'Test Song', 'artist': 'YueC Demo', 'album': '', 'url': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', 'source': 'demo'},
              ];
            }
            Future<String> getSongUrl(Map<String, String> song) async {
              if (song['source'] == 'demo') return song['url'] ?? 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
              if (song['source'] == 'netease') return 'https://music.163.com/song/media/outer/url?id=${song['url']?.replaceFirst('netease:', '')}.mp3';
              return 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
            }
          }
          DARTEOF
          cat > lib/screens/music_source_screen.dart << 'DARTEOF2'
          import 'package:flutter/material.dart';
          class MusicSourceScreen extends StatefulWidget {
            const MusicSourceScreen({super.key});
            @override
            State<MusicSourceScreen> createState() => _MusicSourceScreenState();
          }
          class _MusicSourceScreenState extends State<MusicSourceScreen> {
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF0F1535),
                appBar: AppBar(title: const Text('Music Sources'), backgroundColor: const Color(0xFF1A1F4E)),
                body: const Center(
                  child: Text('Music sources coming soon', style: TextStyle(color: Color(0xFF7799CC), fontSize: 16)),
                ),
              );
            }
          }
          DARTEOF2
          rm -f lib/models/music_source.dart
          flutter create --org com.yuec --project-name yuec --platforms android .
          flutter pub get
          flutter build apk --debug
          cp build/app/outputs/flutter-apk/app-debug.apk yuec.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yuec.apk
          path: yuec.apk
          retention-days: 30
