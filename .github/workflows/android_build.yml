name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore /tmp/release.keystore \
            -alias yuec -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass yuec123456 -keypass yuec123456 \
            -dname "CN=YueC, OU=YueC, O=YueC, L=Shanghai, ST=Shanghai, C=CN"

      - name: Build
        run: |
          rm -rf android ios test
          flutter create --org com.yuec --project-name yuec --platforms android .
          echo "storeFile=/tmp/release.keystore" > android/key.properties
          echo "storePassword=yuec123456" >> android/key.properties
          echo "keyPassword=yuec123456" >> android/key.properties
          echo "keyAlias=yuec" >> android/key.properties
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: yuec-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
