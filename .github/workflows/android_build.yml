name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Check versions
        run: |
          flutter --version
          dart --version

      - name: Build
        run: |
          rm -rf android ios test
          flutter create --org com.yuec --project-name yuec --platforms android .
          flutter pub get
          flutter build apk --debug
          cp build/app/outputs/flutter-apk/app-debug.apk yuec.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yuec.apk
          path: yuec.apk
          retention-days: 30
