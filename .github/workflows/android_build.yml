name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build
        run: |
          rm -rf android ios test
          keytool -genkey -v -keystore $HOME/key.jks -alias yuec -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=YueC, OU=YueC, O=YueC, L=Shanghai, ST=Shanghai, C=CN"
          flutter create --org com.yuec --project-name yuec --platforms android .
          echo "storeFile=$HOME/key.jks" > android/key.properties
          echo "storePassword=123456" >> android/key.properties
          echo "keyPassword=123456" >> android/key.properties
          echo "keyAlias=yuec" >> android/key.properties
          flutter pub get
          flutter build apk --debug

      - name: Rename APK
        run: |
          mkdir -p /tmp/apk-output
          cp build/app/outputs/flutter-apk/app-debug.apk /tmp/apk-output/yuec.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: yuec-apk
          path: /tmp/apk-output/yuec.apk
          retention-days: 30
