plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.yuec.app"
    compileSdk = 34

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.yuec.app"
        minSdk = 24
        targetSdk = 34
        versionCode = 184
        versionName = "1.8.4"
        multiDexEnabled = true
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("YUEC_KEYSTORE_PATH") ?: "yuec-release-key.jks")
            storePassword System.getenv("YUEC_KEYSTORE_PASSWORD")
            keyAlias System.getenv("YUEC_KEY_ALIAS") ?: "yuec"
            keyPassword System.getenv("YUEC_KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}
